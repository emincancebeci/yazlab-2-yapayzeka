# =============================================================================
# experiments.yaml — Merkezi Konfigürasyon Dosyası
# Grup 15: SKAB + BATADAL
# TÜM parametreler buradan okunur. Python dosyalarında hard-coded değer YOKTUR.
# =============================================================================

# ---------------------------------------------------------------------------
# Veri Setleri
# ---------------------------------------------------------------------------
datasets:
  skab:
    valve1_path: data/raw/skab/valve1/
    valve2_path: data/raw/skab/valve2/
    target_col:  anomaly
    # Bu sütunlar model girdisine dahil edilmez:
    exclude_cols: [datetime, changepoint, source_group, source_file]
    split_strategy: group_kfold
    group_col: source_file       # aynı dosya hem train hem test'te olamaz

  batadal:
    path: data/raw/batadal/BATADAL_dataset04.csv
    target_col:  ATT_FLAG        # dosyada kontrol et, raporda belirt!
    exclude_cols: [DATETIME]     # zaman sütunu model girdisi değil
    split_strategy: temporal     # kronolojik bölme (shuffle=False)
    split_ratio: [0.60, 0.20, 0.20]

# ---------------------------------------------------------------------------
# Veri Ön İşleme
# ---------------------------------------------------------------------------
preprocessing:
  scaler:          minmax   # minmax | standard
  handle_missing:  ffill    # ffill | bfill | drop
  pca_components:  1        # Automata için PC1

# ---------------------------------------------------------------------------
# Sabit Parametreler — Karşılaştırma Deneyleri (Tablo 1, 2, 3, 5)
# ---------------------------------------------------------------------------
fixed:
  window_size: 4
  alphabet_size: 3

# ---------------------------------------------------------------------------
# Parametre Varyasyonu — Sweep Deneyleri (Tablo 4)
# ---------------------------------------------------------------------------
sweep:
  window_sizes:   [3, 4, 5, 6]
  alphabet_sizes: [3, 4, 5, 6]

# ---------------------------------------------------------------------------
# Random Seedler
# ---------------------------------------------------------------------------
seeds: [42, 123, 2026, 7, 999]

# ---------------------------------------------------------------------------
# Eğitim Hiperparametreleri — Tüm DL Modeller İçin Sabit
# ---------------------------------------------------------------------------
training:
  epochs:        50       # üst sınır
  batch_size:    32       # zorunlu
  learning_rate: 0.001
  optimizer:     adam
  loss:          bce      # binary cross-entropy
  early_stopping:
    monitor:  val_loss
    patience: 5           # zorunlu

# ---------------------------------------------------------------------------
# Gürültü Ayarları — Robustness Deneyi (Tablo 2)
# ---------------------------------------------------------------------------
noise:
  type: gaussian
  std:  0.1

# ---------------------------------------------------------------------------
# Derin Öğrenme Model Mimarileri
# ---------------------------------------------------------------------------
models:
  lstm:
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
  gru:
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
  cnn1d:
    num_filters: [32, 64, 128]
    kernel_size: 3
    dropout: 0.2

# ---------------------------------------------------------------------------
# Automata Modeli
# ---------------------------------------------------------------------------
automata:
  anomaly_threshold: 0.05   # path probability < threshold → ANOMALY
  smoothing_alpha: 1.0       # Laplace smoothing; 0 = smoothing yok

# ---------------------------------------------------------------------------
# K-Fold Cross Validation (SKAB için GroupKFold)
# ---------------------------------------------------------------------------
kfold:
  n_splits: 5
  strategy: group_kfold    # group değişkeni: source_file

# ---------------------------------------------------------------------------
# Çıktı Ayarları
# ---------------------------------------------------------------------------
output:
  results_dir:  results/
  figures_dir:  results/figures/
  log_dir:      results/logs/
  save_json:    true       # explainer JSON çıktısı aktif
